# pi-keychain-provider models
# All keychain-anthropic models are defined here.
# Edit this file to add, remove, or override models.
# Optional `apiId` lets a sanitized id map to a bracketed API model id
# (e.g. apiId = "claude-opus-4-7[1m]").

[[models]]
id = "claude-opus-4-7"
name = "Claude Opus 4.7 (Keychain)"
reasoning = true
input = ["text", "image"]
contextWindow = 1000000
maxTokens = 64000
cost = { input = 5, output = 25, cacheRead = 0.5, cacheWrite = 6.25 }

