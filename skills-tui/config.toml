# skills-tui configuration

repos = [
  "file:///Users/kenbanks/Software/DevBox/local-skills",
  "vercel-labs/skills",
  "anthropics/skills",
  "huggingface/skills",
  "openai/skills",
  "msmps/opentui-skill",
  "vercel-labs/agent-skills",
  "kepano/obsidian-skills",
  "obra/superpowers",
  "mattpocock/skills",
  "sickn33/antigravity-awesome-skills",
  "ooiyeefei/ccc",
]

[agents]
enabled = [
  "claude-code",
  "codex",
  "cursor",
  "gemini-cli",
  "opencode",
  "pi",
]

# Agents that discover skills from the standard .agents/skills paths.
# These agents will see any skill installed by the skills CLI.
# "both" = reads .agents/skills (local) and ~/.agents/skills (global)
# "local" = reads .agents/skills (local) only
[agents.universal]
both = [
  "augment",
  "codex",
  "gemini-cli",
  "kimi-cli",
  "mux",
  "opencode",
  "openhands",
  "pi",
  "roo",
  "windsurf",
]
local = [
  "amp",
  "antigravity",
  "command-code",
  "cursor",
  "goose",
  "replit",
]

# To add a custom agent or override builtin paths:
# [[custom-agents]]
# name = "my-agent"
# display = "My Agent"
# local = ".my-agent/skills/"
# global = "~/.my-agent/skills/"
