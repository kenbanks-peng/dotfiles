# skills-tui configuration

[repos]
list = [
  "vercel-labs/skills",
  "anthropics/skills",
  "huggingface/skills",
  "openai/skills",
  "msmps/opentui-skill",
  "vercel-labs/agent-skills",
  "kepano/obsidian-skills",
  "obra/superpowers",
  "sickn33/antigravity-awesome-skills",
]

[agents]
enabled = [
  "claude-code",
  "codex",
  "cursor",
  "pi",
]

